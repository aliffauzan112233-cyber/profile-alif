<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Alif Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- SweetAlert2 for nice alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Modern Glassmorphism Login */
        :root {
            --bg-main: #070b14;
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--accent-color);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            background: rgba(56, 189, 248, 0.05);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-color), #0ea5e9);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(56, 189, 248, 0.5);
        }

        .toggle-form {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .toggle-form span {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .toggle-form span:hover {
            text-decoration: underline;
        }

        /* Ambient Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }
        .blob-1 {
            width: 300px;
            height: 300px;
            background: rgba(56, 189, 248, 0.2);
            top: -100px;
            left: -100px;
        }
        .blob-2 {
            width: 400px;
            height: 400px;
            background: rgba(14, 165, 233, 0.15);
            bottom: -150px;
            right: -100px;
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        
        <div class="header">
            <h2 id="form-title">Welcome Back</h2>
            <p id="form-subtitle">Silakan login ke akun Anda.</p>
        </div>

        <form id="auth-form">
            <div class="form-group" id="name-group" style="display: none;">
                <i class="fas fa-user"></i>
                <input type="text" id="name" class="form-control" placeholder="Nama Lengkap">
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">Login</button>
        </form>

        <div class="toggle-form">
            <p id="toggle-text">Belum punya akun? <span onclick="toggleMode()">Bikin Akun</span></p>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');
        const authForm = document.getElementById('auth-form');

        function toggleMode() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                // Switch to Login Mode
                formTitle.textContent = 'Welcome Back';
                formSubtitle.textContent = 'Silakan login ke akun Anda.';
                nameGroup.style.display = 'none';
                nameInput.removeAttribute('required');
                submitBtn.textContent = 'Login';
                toggleText.innerHTML = 'Belum punya akun? <span onclick="toggleMode()">Bikin Akun</span>';
            } else {
                // Switch to Register Mode
                formTitle.textContent = 'Buat Akun';
                formSubtitle.textContent = 'Daftarkan diri Anda sekarang.';
                nameGroup.style.display = 'block';
                nameInput.setAttribute('required', 'true');
                submitBtn.textContent = 'Register';
                toggleText.innerHTML = 'Sudah punya akun? <span onclick="toggleMode()">Login</span>';
            }
        }

        authForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isLoginMode) {
                // Handle Login
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.email === email && u.password === password);

                if (user) {
                    // Berhasil Login
                    Swal.fire({
                        icon: 'success',
                        title: 'Login Berhasil!',
                        text: `Selamat datang kembali, ${user.name}!`,
                        background: '#0f172a',
                        color: '#f8fafc',
                        confirmButtonColor: '#38bdf8',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'index.html'; // Redirect ke portfolio
                    });
                } else {
                    // Gagal Login
                    Swal.fire({
                        icon: 'error',
                        title: 'Login Gagal',
                        text: 'Email atau password salah. Cek kembali atau bikin akun jika belum punya.',
                        background: '#0f172a',
                        color: '#f8fafc',
                        confirmButtonColor: '#38bdf8'
                    });
                }
            } else {
                // Handle Register
                const name = document.getElementById('name').value;
                const users = JSON.parse(localStorage.getItem('users')) || [];
                
                // Cek apakah email sudah terdaftar
                const existingUser = users.find(u => u.email === email);
                if (existingUser) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Email Terdaftar',
                        text: 'Email ini sudah digunakan. Silakan langsung login.',
                        background: '#0f172a',
                        color: '#f8fafc',
                        confirmButtonColor: '#38bdf8'
                    });
                    return;
                }

                // Simpan user baru
                users.push({ name, email, password });
                localStorage.setItem('users', JSON.stringify(users));

                Swal.fire({
                    icon: 'success',
                    title: 'Akun Berhasil Dibuat!',
                    text: 'Silakan login dengan akun baru Anda.',
                    background: '#0f172a',
                    color: '#f8fafc',
                    confirmButtonColor: '#38bdf8'
                }).then(() => {
                    // Balik ke mode login
                    authForm.reset();
                    toggleMode();
                });
            }
        });
    </script>
</body>
</html>
